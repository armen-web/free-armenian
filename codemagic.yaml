workflows:
  ios_capacitor_release:
    name: Free Armenian iOS - Release TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "org.freearmenian.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "org.freearmenian.app"

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        - ~/.npm
        - ios/App/Pods

    scripts:
      - name: Install npm dependencies
        script: |
          npm install --package-lock=false --no-audit --no-fund

      - name: Generate iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Apply Codemagic signing profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
